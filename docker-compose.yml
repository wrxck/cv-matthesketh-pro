services:
  cv-matthesketh-pro:
    build: .
    container_name: cv-matthesketh-pro
    ports:
      - "127.0.0.1:60611:60611"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.0.0/16
